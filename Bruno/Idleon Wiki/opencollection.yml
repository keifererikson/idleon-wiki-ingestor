opencollection: 1.0.0

info:
  name: Idleon Wiki
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: User-Agent
      value: "PersonalWikiIngestorTest/0.1 (Contact: keifer@erikson.dev or GitHub: keifererikson)"
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    presets:
      request:
        type: http
        url: https://idleon.wiki/api.php
